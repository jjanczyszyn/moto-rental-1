<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Karen & JJ Moto Rental</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --ink: #0a0a0a;
    --ink-2: #2b2b2b;
    --muted: #767676;
    --line: #ebebeb;
    --line-2: #f3f3f3;
    --chip: #f5f5f5;
    --accent: #ff5a3c; /* sunset orange to match logo */
    --accent-ink: #ffffff;
    --ok: #16a34a;
    --warn: #b45309;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: #efefef; font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); }
  body { min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px 0; }
  #root { width: 100%; display: flex; justify-content: center; }
  @media (max-width: 700px) {
    body { padding: 0; background: #fff; align-items: stretch; height: 100vh; height: 100dvh; min-height: 0; overflow: hidden; }
    #root { height: 100vh; height: 100dvh; }
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  /* Hide scrollbars inside the phone viewport for cleanliness */
  .phone-scroll { scrollbar-width: none; }
  .phone-scroll::-webkit-scrollbar { display: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel" src="bikes.jsx"></script>

<script type="text/babel" src="screens-flow.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
