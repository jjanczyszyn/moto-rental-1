<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>Karen & JJ Moto Rental</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --ink: #0a0a0a;
    --ink-2: #2b2b2b;
    --muted: #767676;
    --line: #ebebeb;
    --line-2: #f3f3f3;
    --chip: #f5f5f5;
    --accent: #ff5a3c;
    --accent-ink: #ffffff;
    --ok: #16a34a;
    --warn: #b45309;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: #fff; font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); }
  body, html { height: 100vh; height: 100dvh; min-height: 0; overflow: hidden; }
  #root { height: 100vh; height: 100dvh; width: 100%; }
  @media (max-width: 700px) {
    /* Phone: kill the centered desktop column and let content go edge-to-edge. */
    body { background: #fff; }
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .phone-scroll { scrollbar-width: none; }
  .phone-scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
